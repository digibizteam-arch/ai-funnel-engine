<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Let's Talk — Maria Angelica Scott</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #F5F0E8; --cream-mid: #EDE5D6; --sand: #D4C4A8;
      --clay: #B8956A; --clay-dark: #8B6A42; --bark: #3D2B1F;
      --white: #FFFDF9; --text: #3D2B1F; --text-mid: #7A6152;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

    /* Header */
    .chat-header {
      background: var(--bark);
      color: var(--white);
      padding: 16px 24px;
      display: flex; align-items: center; gap: 14px;
      position: sticky; top: 0; z-index: 10;
    }
    .chat-avatar {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--clay);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem; color: white; flex-shrink: 0;
    }
    .chat-header-info { flex: 1; }
    .chat-header-name { font-weight: 500; font-size: 0.95rem; }
    .chat-header-status { font-size: 0.75rem; opacity: 0.6; display: flex; align-items: center; gap: 5px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #4CAF50; }

    /* Messages */
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 24px 16px;
      display: flex; flex-direction: column; gap: 16px;
      max-width: 680px; width: 100%; margin: 0 auto;
    }

    .msg { display: flex; gap: 10px; align-items: flex-end; }
    .msg.user { flex-direction: row-reverse; }

    .msg-bubble {
      max-width: 75%; padding: 12px 16px;
      border-radius: 18px; font-size: 0.9rem; line-height: 1.6;
    }
    .msg.bot .msg-bubble { background: var(--white); border: 1px solid var(--cream-mid); border-bottom-left-radius: 4px; }
    .msg.user .msg-bubble { background: var(--bark); color: var(--white); border-bottom-right-radius: 4px; }

    .msg-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--clay); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; color: white; flex-shrink: 0; font-family: 'Playfair Display', serif; }

    .typing { display: flex; align-items: center; gap: 5px; padding: 14px 16px; }
    .typing span { width: 7px; height: 7px; border-radius: 50%; background: var(--sand); animation: bounce 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    /* Input */
    .chat-input-wrap {
      border-top: 1px solid var(--cream-mid);
      background: var(--white);
      padding: 14px 16px;
      display: flex; gap: 10px; align-items: flex-end;
      max-width: 680px; width: 100%; margin: 0 auto;
    }

    .chat-input {
      flex: 1; border: 1.5px solid var(--cream-mid); border-radius: 22px;
      padding: 11px 16px; font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem; color: var(--text); outline: none; resize: none;
      background: var(--cream); transition: border-color 0.15s;
      max-height: 120px; overflow-y: auto;
    }
    .chat-input:focus { border-color: var(--clay); }

    .send-btn {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--bark); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 1rem; flex-shrink: 0;
      transition: background 0.2s, transform 0.15s;
    }
    .send-btn:hover { background: var(--clay); transform: scale(1.05); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .chat-outer { display: flex; flex-direction: column; flex: 1; }

    .msg.bot .msg-bubble a {
      display: inline-block;
      margin-top: 10px;
      background: var(--clay);
      color: var(--white) !important;
      font-weight: 500;
      font-size: 0.88rem;
      padding: 10px 22px;
      border-radius: 100px;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
    }
    .msg.bot .msg-bubble a:hover {
      background: var(--clay-dark);
      transform: translateY(-1px);
    }

    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .msg { animation: fadeIn 0.3s ease both; }
  </style>
</head>
<body>

<div class="chat-header">
  <div class="chat-avatar">MA</div>
  <div class="chat-header-info">
    <div class="chat-header-name">Maria's AI Sales Assistant</div>
    <div class="chat-header-status"><span class="status-dot"></span> Online — typically replies instantly</div>
  </div>
</div>

<div class="chat-outer">
  <div class="chat-messages" id="chat-messages"></div>

  <div style="max-width:680px;width:100%;margin:0 auto;padding:0 16px 8px">
    <div class="chat-input-wrap" style="max-width:100%;padding:0">
      <textarea class="chat-input" id="chat-input" placeholder="Type your message..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>
  <p style="text-align:center;font-size:0.72rem;color:var(--text-mid);opacity:0.6;padding:8px 16px 20px">Powered by Maria Angelica Scott — System Architect &nbsp;·&nbsp; AI-assisted conversation</p>
</div>

<script>
  const params  = new URLSearchParams(window.location.search);
  const userName = params.get('name') || '';
  const userEmail= params.get('email') || '';
  const leadId   = params.get('id') || '';

  const messages = [];
  let isTyping = false;

  // Opening message
  window.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
      const greeting = userName
        ? `Hey ${userName.split(' ')[0]}! 👋 I'm Maria's AI assistant. I've seen your quiz results and the funnel preview we built for you — and I have to say, there's a real opportunity here.`
        : `Hey there! 👋 I'm Maria's AI assistant. I've looked at your quiz results and the funnel preview — and there's a real opportunity here.`;
      addBotMessage(greeting);

      setTimeout(() => {
        addBotMessage("Before I share the details of how we can build this for you — can I ask: what stood out most from your funnel preview? What felt most relevant to your business?");
      }, 1200);
    }, 800);
  });

  function sanitizeReply(text) {
    return text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      // Restore safe <a href="..." target="..." rel="...">...</a>
      .replace(/&lt;a href="([^"]*)" target="([^"]*)" rel="([^"]*)"&gt;([^&]*)&lt;\/a&gt;/g,
        '<a href="$1" target="$2" rel="$3">$4</a>')
      // Without rel attribute
      .replace(/&lt;a href="([^"]*)" target="([^"]*)"&gt;([^&]*)&lt;\/a&gt;/g,
        '<a href="$1" target="$2" rel="noopener noreferrer">$3</a>')
      // Without target attribute
      .replace(/&lt;a href="([^"]*)"&gt;([^&]*)&lt;\/a&gt;/g,
        '<a href="$1" target="_blank" rel="noopener noreferrer">$2</a>');
  }

  function addBotMessage(text) {
    const wrap = document.getElementById('chat-messages');
    const msg = document.createElement('div');
    msg.className = 'msg bot';
    msg.innerHTML = `<div class="msg-avatar">MA</div><div class="msg-bubble">${sanitizeReply(text)}</div>`;
    wrap.appendChild(msg);
    wrap.scrollTop = wrap.scrollHeight;
    messages.push({ role: 'assistant', content: text });
  }

  function addUserMessage(text) {
    const wrap = document.getElementById('chat-messages');
    const msg = document.createElement('div');
    msg.className = 'msg user';
    msg.innerHTML = `<div class="msg-bubble">${text}</div>`;
    wrap.appendChild(msg);
    wrap.scrollTop = wrap.scrollHeight;
    messages.push({ role: 'user', content: text });
  }

  function showTyping() {
    const wrap = document.getElementById('chat-messages');
    const t = document.createElement('div');
    t.className = 'msg bot'; t.id = 'typing-indicator';
    t.innerHTML = `<div class="msg-avatar">MA</div><div class="msg-bubble typing"><span></span><span></span><span></span></div>`;
    wrap.appendChild(t);
    wrap.scrollTop = wrap.scrollHeight;
  }

  function hideTyping() {
    const t = document.getElementById('typing-indicator');
    if (t) t.remove();
  }

  async function sendMessage() {
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if (!text || isTyping) return;

    input.value = '';
    input.style.height = 'auto';
    addUserMessage(text);
    isTyping = true;
    document.getElementById('send-btn').disabled = true;
    showTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages, lead_id: leadId, name: userName, email: userEmail })
      });
      const data = await res.json();
      hideTyping();
      addBotMessage(data.reply || "I'm sorry, something went wrong. Please try again.");
    } catch(err) {
      hideTyping();
      addBotMessage("Sorry, I ran into an issue. Please refresh and try again.");
    } finally {
      isTyping = false;
      document.getElementById('send-btn').disabled = false;
      document.getElementById('chat-input').focus();
    }
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }
</script>
</body>
</html>
