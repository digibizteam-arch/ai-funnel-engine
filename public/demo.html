<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Your Funnel Preview — Maria Angelica Scott</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:#0f0f0f;color:#fff;min-height:100vh;display:flex;flex-direction:column}
    .demo-bar{position:fixed;top:0;left:0;right:0;z-index:9999;background:rgba(13,13,13,0.97);backdrop-filter:blur(12px);border-bottom:1px solid rgba(184,149,106,0.3);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;min-height:52px}
    .demo-left{display:flex;align-items:center;gap:10px;min-width:0}
    .demo-badge{background:#B8956A;color:#fff;font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;padding:4px 12px;border-radius:100px;white-space:nowrap;flex-shrink:0}
    .demo-label{font-size:0.78rem;color:rgba(255,255,255,0.45);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    /* ── PULSING CTA BUTTON ── */
    .demo-cta {
      background: #B8956A;
      color: #fff;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      padding: 10px 22px;
      border-radius: 100px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
      flex-shrink: 0;
      position: relative;
      /* Pulsing glow animation */
      animation: ctaPulse 2s ease-in-out infinite;
      box-shadow: 0 0 0 0 rgba(184,149,106,0.7);
    }
    .demo-cta:hover {
      background: #8B6A42;
      transform: translateY(-1px);
      animation: none;
      box-shadow: 0 6px 24px rgba(184,149,106,0.5);
    }
    /* Ping dot — urgent indicator */
    .demo-cta::before {
      content: '';
      position: absolute;
      top: -3px;
      right: -3px;
      width: 10px;
      height: 10px;
      background: #ef4444;
      border-radius: 50%;
      border: 2px solid #0f0f0f;
      animation: pingDot 1.5s ease-in-out infinite;
    }
    @keyframes ctaPulse {
      0%   { box-shadow: 0 0 0 0 rgba(184,149,106,0.7); }
      50%  { box-shadow: 0 0 0 10px rgba(184,149,106,0); }
      100% { box-shadow: 0 0 0 0 rgba(184,149,106,0); }
    }
    @keyframes pingDot {
      0%, 100% { transform: scale(1); opacity: 1; }
      50%       { transform: scale(1.4); opacity: 0.6; }
    }

    #loading{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:20px;padding:24px;text-align:center;padding-top:80px}
    .spinner{width:42px;height:42px;border:3px solid rgba(255,255,255,0.08);border-top-color:#B8956A;border-radius:50%;animation:spin 0.9s linear infinite}
    #error-state{display:none;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:16px;text-align:center;padding:24px;padding-top:80px}
    #preview-wrap{display:none;flex:1;padding-top:52px}
    #preview-frame{width:100%;height:calc(100vh - 52px);border:none;display:block}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="demo-bar">
  <div class="demo-left">
    <span class="demo-badge">🎯 Demo Preview</span>
    <span class="demo-label">Generated based on your quiz answers</span>
  </div>
  <a href="/chat" class="demo-cta" id="chat-link">💬 I want this for my business →</a>
</div>

<div id="loading">
  <div class="spinner"></div>
  <div style="font-size:1.05rem;font-weight:500">Loading your personalized funnel preview...</div>
  <div style="font-size:0.83rem;color:rgba(255,255,255,0.4);max-width:300px;line-height:1.6">We built this based on your exact quiz answers. Just a moment.</div>
</div>

<div id="error-state">
  <div style="font-size:2.5rem">⚠️</div>
  <div style="font-size:1.05rem;font-weight:500">Preview not found</div>
  <div style="font-size:0.83rem;color:rgba(255,255,255,0.4);max-width:300px;line-height:1.6">This demo link may have expired. Go back and generate a new preview.</div>
  <a href="/" style="margin-top:8px;color:#B8956A;font-size:0.88rem;text-decoration:none">← Back to quiz</a>
</div>

<div id="preview-wrap">
  <iframe id="preview-frame" title="Your Funnel Preview" sandbox="allow-same-origin allow-scripts allow-popups allow-forms"></iframe>
</div>

<script>
  const params  = new URLSearchParams(window.location.search);
  const leadId  = params.get('id');
  const name    = params.get('name') || '';
  const email   = params.get('email') || '';

  // Update chat link
  const chatParams = new URLSearchParams();
  if (name)   chatParams.set('name', name);
  if (email)  chatParams.set('email', email);
  if (leadId) chatParams.set('id', leadId);
  const chatUrl = '/chat' + (chatParams.toString() ? '?' + chatParams.toString() : '');
  document.getElementById('chat-link').href = chatUrl;

  async function loadDemo() {
    if (!leadId || leadId === 'preview') { showError(); return; }
    try {
      // Get config first
      const cfg = await fetch('/api/config').then(r => r.json());

      // Fetch demo HTML from Supabase
      const res = await fetch(
        `${cfg.supabase_url}/rest/v1/leads?id=eq.${leadId}&select=demo_html,name`,
        { headers: { 'apikey': cfg.supabase_key, 'Authorization': 'Bearer ' + cfg.supabase_key } }
      );
      const data = await res.json();

      if (!data || !data[0] || !data[0].demo_html) { showError(); return; }

      const html = data[0].demo_html;
      const blob = new Blob([html], { type: 'text/html' });
      const url  = URL.createObjectURL(blob);
      const frame = document.getElementById('preview-frame');
      frame.src = url;
      frame.onload = () => {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('preview-wrap').style.display = 'flex';
        document.getElementById('preview-wrap').style.flexDirection = 'column';
      };
    } catch(err) {
      console.error(err);
      showError();
    }
  }

  function showError() {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-state').style.display = 'flex';
  }

  loadDemo();
</script>
</body>
</html>
